<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome</title>
</head>
<body style="font-family: Arial, sans-serif; color: #333; margin: 0; padding: 24px;">
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; margin: 0 auto;">
    <tr>
      <td style="padding-bottom: 16px;">
        <img src="cid:logo" alt="Logo" width="120" style="display: block;">
      </td>
    </tr>
    <tr>
      <td style="padding-bottom: 16px;">
        <img src="cid:java" alt="Java" width="80" style="display: block;">
      </td>
    </tr>
    <tr>
      <td style="background: #f5f7fb; border-radius: 8px; padding: 24px;">
        <h1 style="margin-top: 0;">Hello, {{name}}!</h1>
        <p>Thanks for trying the Spring Boot HTML email demo.</p>
        <p>This message loads its body from <code>classpath:templates/welcome.html</code>
          and embeds images from <code>classpath:images/logo.png</code> and
          <code>classpath:images/java.png</code>.</p>
      </td>
    </tr>
  </table>
</body>
</html>
